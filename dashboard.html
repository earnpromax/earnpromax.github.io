<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EARN-PRO-MAX - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #1a1a2e; }
.header {
            background: #1a1a2e; color: white; padding: 12px 20px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100;
        }
.menu-btn {
            font-size: 22px; cursor: pointer; padding: 6px 10px;
            border-radius: 6px; transition: 0.2s;
        }
.menu-btn:hover { background: rgba(255,255,255,0.1); }
.site-logo { height: 35px; width: auto; max-width: 150px; object-fit: contain; }
.header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.3px; }

.marquee-box {
            background: #667eea; color: white; padding: 10px 0;
            overflow: hidden; white-space: nowrap; position: relative;
        }
.marquee-text {
            display: inline-block; padding-left: 100%;
            animation: marquee 20s linear infinite;
            font-size: 14px; font-weight: 500;
        }
@keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

.sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100vh;
            background: white; box-shadow: 2px 0 12px rgba(0,0,0,0.15);
            transition: 0.3s; z-index: 200; padding-top: 70px; overflow-y: auto;
        }
.sidebar.active { left: 0; }
.sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 150;
        }
.sidebar-overlay.active { display: block; }
.menu-item {
            padding: 16px 25px; color: #333; cursor: pointer;
            font-size: 15px; border-bottom: 1px solid #f0f0f0;
            transition: 0.2s; display: flex; align-items: center; gap: 14px;
            font-weight: 500;
        }
.menu-item:hover { background: #f8f9ff; color: #1a1a2e; }
.menu-item.active { background: #f8f9ff; color: #1a1a2e; font-weight: 600; border-left: 3px solid #1a1a2e; }
.container { padding: 20px; max-width: 700px; margin: 0 auto; }

.welcome-text {
            font-size: 24px; font-weight: 700; color: #1a1a2e;
            margin-bottom: 20px; text-align: center;
        }
.welcome-text span { color: #667eea; }

.main-balance {
            background: white; border-radius: 14px; padding: 35px 25px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08); margin-bottom: 18px;
            text-align: center; border-top: 4px solid #1a1a2e;
        }
.main-balance-label {
            font-size: 13px; color: #666; font-weight: 500;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;
        }
.main-balance-amount {
            font-size: 48px; font-weight: 700; color: #1a1a2e;
            margin-bottom: 12px; line-height: 1.2;
        }
.today-income {
            font-size: 16px; color: #666; font-weight: 500;
            padding-top: 18px; border-top: 1px solid #e8eaf6; margin-top: 18px;
        }
.today-income span { color: #1a1a2e; font-weight: 700; font-size: 20px; }

.inactive-banner {
            background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px;
            padding: 18px; margin-bottom: 20px; color: #856404;
        }
.inactive-banner h3 { font-size: 16px; margin-bottom: 8px; font-weight: 600; }
.inactive-banner p { font-size: 14px; line-height: 1.5; }

.section-title { font-size: 16px; font-weight: 600; color: #1a1a2e; margin: 25px 0 15px 0; }
.package-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px; margin-bottom: 25px;
        }
.package-card {
            background: white; border-radius: 10px; padding: 22px 18px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08); text-align: center;
            border: 2px solid #e8eaf6; transition: 0.3s;
        }
.package-card:hover { border-color: #1a1a2e; transform: translateY(-3px); }
.package-card h4 { font-size: 14px; color: #666; margin-bottom: 10px; font-weight: 500; }
.package-price { font-size: 30px; font-weight: 700; color: #1a1a2e; margin: 12px 0; }
.package-info { font-size: 12px; color: #888; margin: 8px 0; }
.package-card button {
            width: 100%; padding: 11px; background: #1a1a2e; color: white;
            border: none; border-radius: 7px; font-size: 14px; font-weight: 600;
            cursor: pointer; margin-top: 12px; transition: 0.2s;
        }
.package-card button:hover { background: #16213e; }

.stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            margin-bottom: 20px;
        }
.stat-card {
            background: white; border-radius: 10px; padding: 18px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08); text-align: center;
        }
.stat-card h4 { font-size: 24px; color: #1a1a2e; font-weight: 700; margin-bottom: 5px; }
.stat-card p { font-size: 12px; color: #666; font-weight: 500; }

.section {
            background: white; border-radius: 12px; padding: 22px;
            margin-bottom: 20px; box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }
.refer-box {
            background: #f8f9ff; padding: 12px; border-radius: 8px;
            word-break: break-all; font-size: 13px; color: #333; margin: 12px 0;
            border: 1px solid #e8eaf6;
        }
.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 500; }
.input-group input,.input-group select {
            width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px; background: white;
        }
.input-group input:disabled { background: #f5f5f5; color: #666; }
