<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EARN-PRO-MAX - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .container {
            background: white; padding: 30px; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 90%; max-width: 400px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px;
        }
        button {
            width: 100%; padding: 12px; background: #667eea; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }
        button:hover { background: #5568d3; }
        .toggle { text-align: center; margin-top: 15px; color: #666; cursor: pointer; }
        .toggle span { color: #667eea; font-weight: bold; }
        .hidden { display: none; }
        .msg { padding: 10px; margin: 10px 0; border-radius: 5px; text-align: center; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginBox">
            <h2>EARN-PRO-MAX</h2>
            <div id="loginMsg"></div>
            <input type="text" id="loginUser" placeholder="ইউজারনেম">
            <input type="password" id="loginPass" placeholder="পাসওয়ার্ড">
            <button onclick="login()">লগইন করুন</button>
            <div class="toggle">একাউন্ট নাই? <span onclick="showRegister()">রেজিস্টার করুন</span></div>
        </div>
        <div id="registerBox" class="hidden">
            <h2>নতুন একাউন্ট</h2>
            <div id="regMsg"></div>
            <input type="text" id="regName" placeholder="পুরো নাম">
            <input type="text" id="regUser" placeholder="ইউজারনেম">
            <input type="password" id="regPass" placeholder="পাসওয়ার্ড">
            <input type="text" id="regPhone" placeholder="মোবাইল নাম্বার">
            <input type="text" id="regRefer" placeholder="রেফার কোড (যদি থাকে)">
            <button onclick="register()">রেজিস্টার করুন</button>
            <div class="toggle">একাউন্ট আছে? <span onclick="showLogin()">লগইন করুন</span></div>
        </div>
    </div>
    <script>
        if(localStorage.getItem('currentUser')){window.location.href='dashboard.html';}
        function showRegister(){document.getElementById('loginBox').classList.add('hidden');document.getElementById('registerBox').classList.remove('hidden');}
        function showLogin(){document.getElementById('registerBox').classList.add('hidden');document.getElementById('loginBox').classList.remove('hidden');}
        window.onload=function(){const urlParams=new URLSearchParams(window.location.search);const ref=urlParams.get('ref');if(ref)document.getElementById('regRefer').value=ref;}
        function register(){const name=document.getElementById('regName').value.trim();const user=document.getElementById('regUser').value.trim();const pass=document.getElementById('regPass').value;const phone=document.getElementById('regPhone').value.trim();const refer=document.getElementById('regRefer').value.trim();if(!name||!user||!pass||!phone){showMsg('regMsg','সব ঘর পূরণ করুন','error');return;}let users=JSON.parse(localStorage.getItem('users')||'[]');if(users.find(u=>u.username===user)){showMsg('regMsg','এই ইউজারনেম আগে থেকেই আছে','error');return;}const newUser={name:name,username:user,password:pass,phone:phone,balance:0,planActive:false,referredBy:refer,myReferCode:user,tasksCompleted:0,totalEarned:0};users.push(newUser);if(refer){const refUser=users.find(u=>u.username===refer);if(refUser){let settings=JSON.parse(localStorage.getItem('adminSettings')||'{}');const bonus=settings.referBonus||25;refUser.balance+=bonus;refUser.totalEarned+=bonus;}}localStorage.setItem('users',JSON.stringify(users));showMsg('regMsg','রেজিস্টার সফল! লগইন করুন','success');setTimeout(showLogin,1500);}
        function login(){const user=document.getElementById('loginUser').value.trim();const pass=document.getElementById('loginPass').value;let users=JSON.parse(localStorage.getItem('users')||'[]');const foundUser=users.find(u=>u.username===user&&u.password===pass);if(foundUser){localStorage.setItem('currentUser',user);window.location.href='dashboard.html';}else{showMsg('loginMsg','ইউজারনেম বা পাসওয়ার্ড ভুল','error');}}
        function showMsg(id,text,type){const msg=document.getElementById(id);msg.className='msg '+type;msg.innerText=text;}
    </script>
</body>
</html>
